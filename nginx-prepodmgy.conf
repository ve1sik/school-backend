# Этот файл — правильный конфиг для prepodmgy.ru
# На сервере он находится в /etc/nginx/sites-available/prepodmgy
# (НЕ создавать prepodmgy.ru — только один файл с этим именем!)

server {
    server_name prepodmgy.ru www.prepodmgy.ru;
    client_max_body_size 100M;

    # ─── Frontend SPA (vite preview on 4173) ───
    location / {
        proxy_pass         http://localhost:4173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass         http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ─── Uploads / static files ───
    location /uploads/ {
        proxy_pass         http://localhost:3000/uploads/;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # ─── Telegram webhook (longer timeout) ───
    location /telegram/ {
        proxy_pass         http://localhost:3000/telegram/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 65s;
    }

    # SSL managed by Certbot — не менять руками:
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/prepodmgy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prepodmgy.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name prepodmgy.ru www.prepodmgy.ru;

    if ($host = www.prepodmgy.ru) { return 301 https://$host$request_uri; }
    if ($host = prepodmgy.ru)     { return 301 https://$host$request_uri; }

    return 404;
}
