# Конфиг nginx для prepodmgy.ru
# На сервере: /etc/nginx/sites-available/prepodmgy
# ВАЖНО: только ОДИН файл в sites-enabled — не дублировать prepodmgy.ru!

server {
    server_name prepodmgy.ru www.prepodmgy.ru;
    client_max_body_size 100M;

    # ─── Frontend: статика из dist (без vite preview — стабильнее на мобилках) ───
    root /root/school-backend/school-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    location /uploads/ {
        proxy_pass         http://127.0.0.1:3000/uploads/;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /telegram/ {
        proxy_pass         http://127.0.0.1:3000/telegram/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 65s;
    }

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/prepodmgy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prepodmgy.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name prepodmgy.ru www.prepodmgy.ru;

    if ($host = www.prepodmgy.ru) { return 301 https://$host$request_uri; }
    if ($host = prepodmgy.ru)     { return 301 https://$host$request_uri; }

    return 404;
}
