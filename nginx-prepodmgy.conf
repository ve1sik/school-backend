# Конфиг nginx для prepodmgy.ru
# На сервере: /etc/nginx/sites-available/prepodmgy
# ВАЖНО: только ОДИН файл в sites-enabled — не дублировать prepodmgy.ru!

server {
    server_name prepodmgy.ru www.prepodmgy.ru;
    client_max_body_size 100M;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Frontend: статика (nginx читает из /var/www, не из /root) ───
    root /var/www/prepodmgy;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Не кэшировать 404 — Safari/Telegram WebView иначе «запоминают» мёртвый chunk навсегда
    location /assets/ {
        try_files $uri @asset_missing;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    location @asset_missing {
        internal;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 404;
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    location /uploads/ {
        proxy_pass         http://127.0.0.1:3000/uploads/;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /telegram/ {
        proxy_pass         http://127.0.0.1:3000/telegram/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 65s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/prepodmgy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prepodmgy.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name prepodmgy.ru www.prepodmgy.ru;

    if ($host = www.prepodmgy.ru) { return 301 https://$host$request_uri; }
    if ($host = prepodmgy.ru)     { return 301 https://$host$request_uri; }

    return 404;
}
