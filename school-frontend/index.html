<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#5A4BFF" />
    <meta name="color-scheme" content="light" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Препод из МГУ</title>
    <style>
      html {
        color-scheme: light;
      }
      html, body {
        margin: 0;
        background: #f4f7fe;
        color: #111827;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      #root:empty {
        min-height: 100vh;
        min-height: -webkit-fill-available;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f7fe;
      }
      #root:empty::before {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #5a4bff;
        border-radius: 50%;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }
      #boot-msg {
        position: fixed;
        inset: 0;
        z-index: 9999;
        margin: 0;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: system-ui, sans-serif;
        color: #6b7280;
        background: #f4f7fe;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <p id="boot-msg">Загрузка…</p>
    <script>
      (function () {
        function bootDone() {
          document.documentElement.setAttribute('data-app-ready', '1');
          var m = document.getElementById('boot-msg');
          if (m) m.remove();
        }
        window.__APP_BOOT_DONE__ = bootDone;

        function showFail(hint) {
          if (document.documentElement.getAttribute('data-app-ready')) return;
          document.documentElement.setAttribute('data-app-ready', '1');
          var extra =
            hint === 'timeout'
              ? 'Сайт не ответил. Скорее всего закэширована старая версия — очистите кэш браузера или откройте в режиме инкогнито.'
              : 'Не удалось загрузить приложение. Обновите страницу или очистите кэш браузера.';
          var tg = /Telegram/i.test(navigator.userAgent);
          if (tg) {
            extra += ' Не открывайте сайт из Telegram — скопируйте ссылку и откройте в Safari или Chrome.';
          }
          var html =
            '<div id="boot-msg" style="position:fixed;inset:0;z-index:9999;padding:24px;font-family:system-ui,sans-serif;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f4f7fe">' +
            '<p style="font-weight:800;font-size:18px;margin:0 0 12px;color:#111827">Не удалось загрузить сайт</p>' +
            '<p style="color:#6b7280;font-size:14px;line-height:1.5;margin:0 0 16px;max-width:340px">' +
            extra +
            '</p>' +
            '<button onclick="location.reload(true)" style="padding:12px 20px;border:0;border-radius:12px;background:#5a4bff;color:#fff;font-weight:700;cursor:pointer">Обновить</button>' +
            '</div>';
          var m = document.getElementById('boot-msg');
          if (m) m.outerHTML = html;
          else document.body.insertAdjacentHTML('beforeend', html);
        }

        window.addEventListener(
          'error',
          function (ev) {
            var t = ev.target;
            if (t && t.tagName === 'SCRIPT' && t.src) {
              showFail('script');
              return;
            }
            if (!document.documentElement.getAttribute('data-app-ready')) {
              showFail('runtime');
            }
          },
          true,
        );

        setTimeout(function () {
          if (!document.documentElement.getAttribute('data-app-ready')) showFail('timeout');
        }, 15000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
